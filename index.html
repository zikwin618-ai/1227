<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹流光暗调网站</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主体背景：纯黑底 + 霓虹流光效果 */
        body {
            width: 100vw;
            height: 100vh;
            background: #000; /* 纯黑背景 */
            overflow: hidden; /* 隐藏滚动条 */
            position: relative;
        }

        /* 霓虹流光层：核心动画效果 */
        .neon-flow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(45deg, rgba(68, 0, 255, 0.1), transparent 40%),
                linear-gradient(135deg, rgba(0, 212, 255, 0.1), transparent 40%),
                linear-gradient(225deg, rgba(255, 0, 212, 0.1), transparent 40%),
                linear-gradient(315deg, rgba(0, 255, 157, 0.1), transparent 40%);
            background-size: 200% 200%; /* 放大背景尺寸，实现流动 */
            /* 动画：速度调快（15s）、线性运动、无限循环 */
            animation: neonMove 15s linear infinite;
            /* 虚化效果：给流光层加模糊，提升高级感 */
            filter: blur(8px);
            /* 层级：在背景层，不遮挡内容 */
            z-index: 0;
        }

        /* 流光动画关键帧：背景位置偏移实现流动 */
        @keyframes neonMove {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 200% 200%;
            }
        }

        /* 内容容器：居中显示，层级高于流光层 */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
            /* 内容轻微虚化，与背景融合 */
            backdrop-filter: blur(2px);
        }

        /* 标题霓虹效果 */
        .content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 
                0 0 5px rgba(0, 212, 255, 0.8),
                0 0 10px rgba(0, 212, 255, 0.6),
                0 0 20px rgba(0, 212, 255, 0.4);
        }

        .content p {
            font-size: 1.2rem;
            color: #e0e0e0;
            max-width: 600px;
            line-height: 1.6;
        }

        /* 响应式适配：手机端也能正常显示 */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 2rem;
            }
            .content p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 霓虹流光背景层 -->
    <div class="neon-flow"></div>
    <!-- 内容层 -->
    <div class="content">
        <h1>霓虹流光暗调网站</h1>
        <p>黑底暗色调 · 霓虹流光流动（速度加快）· 虚化高级感<br>直接复制到 GitHub 的 index.html 即可预览</p>
    </div>
</body>
</html>
