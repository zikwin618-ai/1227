<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹流光3D背景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000000;
            font-family: 'Arial', sans-serif;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 3.5vw;
            margin-bottom: 1vw;
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
        }
        p {
            font-size: 1.2vw;
            opacity: 0.7;
        }
        /* 错误提示样式 */
        .error提示 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 16px;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="content">
        <h1>WHYSL DESIGN</h1>
        <p>DRAW THE COLOR OF THE DREAM</p>
    </div>

    <!-- 改用更稳定的CDN（全部统一版本，避免兼容问题） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.148.0/examples/js/postprocessing/ShaderPass.js"></script>

    <script>
        // 第一步：检测WebGL是否可用（关键！）
        if (!THREE.WEBGL.isWebGLAvailable()) {
            const warning = THREE.WEBGL.getWebGLErrorMessage();
            document.body.appendChild(warning);
            // 显示中文提示
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error提示';
            errorDiv.innerText = '你的浏览器不支持WebGL，请更换Chrome/Edge/Firefox浏览器！';
            document.body.appendChild(errorDiv);
        } else {
            // 初始化Three.js核心对象
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.z = 30;
            camera.position.y = 5;

            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 创建霓虹曲线（增加数量，确保能看到）
            const curveCount = 20; // 增加曲线数量，更容易看到效果
            const curves = [];
            const colors = [
                new THREE.Color(0x4169e1), // 深蓝
                new THREE.Color(0x9370db), // 紫
                new THREE.Color(0xff69b4), // 粉
                new THREE.Color(0x1e90ff), // 浅蓝
                new THREE.Color(0xda70d6)  // 玫红
            ];

            function createCurve() {
                const points = [];
                const curveHeight = Math.random() * 40 + 20;
                const curveWidth = Math.random() * 80 + 40;

                for (let i = 0; i < 15; i++) {
                    const x = Math.sin(i * 0.4) * curveWidth + (Math.random() - 0.5) * 20;
                    const y = Math.cos(i * 0.3) * curveHeight + (Math.random() - 0.5) * 10;
                    const z = (Math.random() - 0.5) * 60;
                    points.push(new THREE.Vector3(x, y, z));
                }

                const curve = new THREE.CatmullRomCurve3(points);
                const geometry = new THREE.TubeGeometry(
                    curve,
                    200,
                    1.5, // 加粗线条，更容易看到
                    16,
                    false
                );

                const material = new THREE.MeshBasicMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    transparent: true,
                    opacity: 0.9, // 提高不透明度
                    blending: THREE.AdditiveBlending
                });

                const mesh = new THREE.Mesh(geometry, material);
                curves.push({ mesh, curve, speed: (Math.random() * 0.002) + 0.0005 });
                scene.add(mesh);
            }

            // 批量创建曲线
            for (let i = 0; i < curveCount; i++) {
                createCurve();
            }

            // 修复辉光参数（提高强度，确保能看到）
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.8, // 提高辉光强度
                1.2, // 提高辉光半径
                0.1  // 降低阈值，让更多区域发光
            );
            const composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            composer.addPass(new THREE.ShaderPass(THREE.CopyShader));
            composer.addPass(bloomPass);

            // 动画循环
            function animate() {
                requestAnimationFrame(animate);

                curves.forEach((item) => {
                    item.mesh.rotation.x += 0.001;
                    item.mesh.rotation.z += item.speed;
                    item.mesh.position.x += Math.sin(Date.now() * item.speed) * 0.01;
                    item.mesh.position.z += Math.cos(Date.now() * item.speed) * 0.01;
                });

                camera.position.x = Math.sin(Date.now() * 0.0001) * 5;
                camera.position.y = Math.cos(Date.now() * 0.0001) * 3;
                camera.lookAt(scene.position);

                composer.render();
            }

            // 响应式适配
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });

            // 启动动画
            animate();
        }
    </script>
</body>
</html>
