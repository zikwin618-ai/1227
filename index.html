<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aurora Seamless Flow</title>
  <style>
    :root{
      --bg: #050508;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      color: #fff;
    }
    /* 轻微的前景文字占位，可按需删除 */
    .overlay-title {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 2;
      font-weight: 300;
      font-size: 14px;
      color: rgba(255,255,255,.8);
      user-select: none;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: .2em;
    }

    canvas#aurora {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 0;
    }

    /* 粒子噪声层（ grain ）的占位样式，透明叠加即可看到颗粒感 */
    canvas#grain {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
      opacity: 0.08;
    }
  </style>
</head>
<body>
  <div class="overlay-title">Aurora Seamless Background</div>

  <!-- 主背景画布（极光流光） -->
  <canvas id="aurora" aria-label="Aurora Seamless Background"></canvas>
  <!-- 可选的粒子噪点覆盖层 -->
  <canvas id="grain" aria-label="Grain Overlay"></ canvas>

  <script>
  (function(){
    // 配置区：可修改颜色、曲线数量、速度等
    const config = {
      // 是否启用鼠标视差
      parallax: true,
      // 粒子噪点覆盖（grain overlay）
      grain: true,
      grainTile: 64, // grain tile 大小
      // 三条主极光曲线配置
      ribbons: [
        { color: '#7e5aff', yOffset: -120, amp: 120, freq: 0.0035, speed: 0.0009, lw: 6, blur: 60 },
        { color: '#2cf5ff', yOffset:   0, amp:  95, freq: 0.0030, speed: 0.0010, lw: 5, blur: 50 },
        { color: '#ff59d3', yOffset: +120, amp: 110, freq: 0.0028, speed: 0.0011, lw: 4, blur: 40 }
      ]
    };

    const canvas = document.getElementById('aurora');
    const grainCanvasEl = document.getElementById('grain');
    const ctx = canvas.getContext('2d', { alpha: false });
    const grainCtx = grainCanvasEl.getContext('2d', { alpha: false });

    let dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
    let W = 0, H = 0;
    // 双屏离屏画布，用于无缝平铺
    let backCanvas, backCtx;
    let offW = 0, offH = 0;
    // 无缝循环的偏移量（CSS像素单位）
    let offset = 0;

    // 时间控制
    let lastTs = performance.now();
    let t = 0; // 以秒为单位的时间

    // 鼠标视差
    let mouse = { x: 0, y: 0, nx: 0, ny: 0 };

    function resize() {
      // 视口尺寸
      W = Math.floor(window.innerWidth);
      H = Math.floor(window.innerHeight);
      dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));

      // 设置主画布
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // 离屏画布宽度为 2 倍以实现无缝平铺
      offW = W * 2;
      offH = H;
      backCanvas = backCanvas || document.createElement('canvas');
      backCanvas.width = offW * dpr;
      backCanvas.height = offH * dpr;
      backCtx = backCanvas.getContext('2d', { alpha: false });
      backCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // Grain tile
      if (config.grain) {
        grainCanvasEl.width = W;
        grainCanvasEl.height = H;
        grainCtx.setTransform(1, 0, 0, 1, 0, 0);
        createGrainTile();
      }

      // 重新计算偏移，确保在切换分辨率时不会跳跃
      offset = 0;
    }

    // 生成 grain tile（用于覆盖层）
    let grainTile = null;
    function createGrainTile() {
      grainTile = document.createElement('canvas');
      grainTile.width = config.grainTile;
      grainTile.height = config.grainTile;
      const gctx = grainTile.getContext('2d');
      // 轻微随机噪声
      for (let i = 0; i < (config.grainTile * config.grainTile) / 3; i++) {
        const x = Math.floor(Math.random() * config.grainTile);
        const y = Math.floor(Math.random() * config.grainTile);
        gctx.fillStyle = 'rgba(255,255,255,0.04)';
        gctx.fillRect(x, y, 1, 1);
      }
    }

    // 绘制单段曲线（高度范围 0..W*2），用于两段拼接
    function drawRibbonsSegment(ctx2d, t, Wseg, Hseg, ribbons, parallaxYFactor) {
      for (let i = 0; i < ribbons.length; i++) {
        const r = ribbons[i];
        ctx2d.lineWidth = r.lw;
        ctx2d.strokeStyle = r.color;
        ctx2d.shadowBlur = r.blur;
        ctx2d.shadowColor = r.color;
        ctx2d.beginPath();

        // 从 0 到 Wseg 绘制一个段落；第二段将通过平移实现无缝拼接
        for (let x = 0; x <= Wseg; x += 8) {
          const worldX = x; // 当前段的局部x
          const y =
            (Hseg / 2) + r.yOffset +
            (config.parallax ? parallaxYFactor * (i + 1) : 0) +
            Math.sin(worldX * r.freq + t * r.speed) * r.amp +
            Math.sin(worldX * r.freq * 0.5 - t * r.speed * 1.2) * r.amp * 0.4;

          if (x === 0) ctx2d.moveTo(x, y);
          else ctx2d.lineTo(x, y);
        }
        ctx2d.stroke();
      }
    }

    // 无缝绘制：在离屏画布上绘制两段并拼接
    function renderBack(t) {
      // 清空离屏
      backCtx.clearRect(0, 0, offW, offH);
      // 背景颜色，深色基调
      backCtx.fillStyle = '#030308';
      backCtx.fillRect(0, 0, offW, offH);

      // 第一段：0..W
      backCtx.save();
      drawRibbonsSegment(backCtx, t, W, H, config.ribbons, 0);
      backCtx.restore();

      // 第二段：平移 W，绘制同样内容，确保无缝拼接
      backCtx.save();
      backCtx.translate(W, 0);
      drawRibbonsSegment(backCtx, t, W, H, config.ribbons, 0);
      backCtx.restore();
    }

    // 绘制 Grain Overlay（可选）
    function renderGrain() {
      if (!config.grain) return;
      if (!grainTile) return;
      grainCtx.clearRect(0, 0, W, H);
      grainCtx.drawImage(grainTile, 0, 0, W, H);

      // 将 grain tile 平铺到主画布
      ctx.save();
      ctx.globalCompositeOperation = 'overlay';
      ctx.globalAlpha = 0.12;
      // 使用简单平铺实现
      for (let y = 0; y < H; y += config.grainTile) {
        for (let x = 0; x < W; x += config.grainTile) {
          ctx.drawImage(grainCanvasEl, x, y, config.grainTile, config.grainTile);
        }
      }
      ctx.restore();
    }

    // 鼠标移动事件：简单的视差实现
    window.addEventListener('mousemove', (e) => {
      if (!config.parallax) return;
      const nx = (e.clientX / W) * 2 - 1;
      const ny = (e.clientY / H) * 2 - 1;
      mouse.x = nx;
      mouse.y = ny;
      mouse.nx = nx;
      mouse.ny = ny;
    });

    // 动画循环
    function loop(now) {
      const dt = Math.min(32, now - lastTs); // cap dt
      lastTs = now;
      t += dt / 1000; // 秒

      // 更新偏移量，确保无缝循环
      offset += dt * 0.15; // 调整快慢，这里是像素级平滑滚动
      if (offset > W) offset -= W;

      // 先在离屏画布绘制两段无缝内容
      renderBack(t);

      // 把离屏画布裁剪出主视口区域到主画布
      // 由于 backCanvas 使用了 DPR，实际绘制时坐标为 CSS 像素
      ctx.drawImage(backCanvas, 0, 0, W, H, 0, 0, W, H);

      // 可选 Grain Overlay
      if (config.grain) {
        renderGrain();
      }

      requestAnimationFrame(loop);
    }

    // 初始化
    function init() {
      resize();
      window.addEventListener('resize', resize, { passive: true });
      lastTs = performance.now();
      requestAnimationFrame(loop);
    }

    init();
  })();
  </script>
</body>
</html>
