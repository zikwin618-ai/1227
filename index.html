<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aurora Neon Flow</title>
  <style>
    :root {
      --bg: #030305;
      --bg-deep: #050508;
      --text: #ffffff;
      --glow-purple: #7e5aff;
      --glow-cyan: #2cf5ff;
      --glow-pink: #ff59d3;
    }

    /* 页面整体 */
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
    }

    /* 背景层：极光风格的渐变和虚化效果，用以增强深色基调的质感 */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 15% 20%, rgba(124, 0, 255, 0.25), transparent 40%),
                  radial-gradient(circle at 85% 40%, rgba(0, 255, 255, 0.25), transparent 40%),
                  linear-gradient(#03030a, #03030a 60%, #020205 100%);
      z-index: 0;
      filter: blur(0.5px);
      pointer-events: none;
    }

    /* 模拟柔和的飘散雾霭层，增加“缓慢高级感”的虚化效果 */
    .mist {
      position: fixed;
      left: -10vw;
      top: -10vh;
      width: 120vw;
      height: 120vh;
      background: radial-gradient(circle at 60% 40%, rgba(120, 0, 255, 0.25), transparent 40%),
                  radial-gradient(circle at 20% 70%, rgba(0, 200, 255, 0.25), transparent 40%);
      filter: blur(60px);
      opacity: 0.6;
      z-index: 0;
      animation: mistMove 60s linear infinite;
    }
    @keyframes mistMove {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-8vw, 6vh) scale(1.05); }
      100% { transform: translate(6vw, -4vh) scale(1); }
    }

    /* 画布层，承载流光曲线 */
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* 顶层文本占位（若需要，可自行添加） */
    .content {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
      text-align: center;
      color: rgba(255,255,255,0.9);
    }
    .title {
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: .25em;
      text-shadow: 0 0 20px rgba(255,255,255,.6);
      text-transform: uppercase;
    }

    @media (min-width: 900px) {
      .title { font-size: 3.5rem; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="mist"></div>

  <!-- Flowing neon canvas -->
  <canvas id="aurora"></canvas>

  <!-- Optional foreground text (可删去，留作占位) -->
  <div class="content" aria-label="title">
    <div class="title">NEON FLOW</div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('aurora');
      const ctx = canvas.getContext('2d');

      let w = 0, h = 0;
      let t = 0;
      let ribbons = [];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;

        // 根据当前高度动态设置曲线参数
        ribbons = [
          { color: '#7e5aff', yOffset: -100, amp: Math.min(h * 0.28, 220), freq: 0.0038, phase: Math.random() * Math.PI * 2, speed: 0.0006, lw: 6, blur: 60 },
          { color: '#2cf5ff', yOffset:   30, amp: Math.min(h * 0.22, 180), freq: 0.0032, phase: Math.random() * Math.PI * 2, speed: 0.0008, lw: 5, blur: 50 },
          { color: '#ff59d3', yOffset:  110, amp: Math.min(h * 0.18, 140), freq: 0.0028, phase: Math.random() * Math.PI * 2, speed: 0.0009, lw: 4, blur: 40 }
        ];
      }

      function drawFrame() {
        // 背景清理
        ctx.clearRect(0, 0, w, h);
        // 深色背景
        ctx.fillStyle = '#030308';
        ctx.fillRect(0, 0, w, h);

        // 绘制每一条霓虹线
        ribbons.forEach((r) => {
          ctx.lineWidth = r.lw;
          ctx.strokeStyle = r.color;
          ctx.shadowBlur = r.blur;
          ctx.shadowColor = r.color;

          ctx.beginPath();
          for (let x = 0; x <= w; x += 8) {
            // 三重正弦叠加，形成更自然的波动
            const y = (h / 2) +
                      r.yOffset +
                      Math.sin(x * r.freq + t * r.speed + r.phase) * r.amp +
                      Math.sin(x * r.freq * 0.5 + t * r.speed * 1.1) * r.amp * 0.4;

            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();

          // 轻微的中心高光
          ctx.lineWidth = r.lw * 1.2;
          ctx.strokeStyle = 'rgba(255,255,255,0.25)';
          ctx.beginPath();
          for (let x = 0; x <= w; x += 8) {
            const y = (h / 2) +
                      r.yOffset +
                      Math.sin(x * r.freq + t * r.speed + r.phase) * r.amp +
                      Math.sin(x * r.freq * 0.5 + t * r.speed * 1.1) * r.amp * 0.4;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        });

        t += 16;
        requestAnimationFrame(drawFrame);
      }

      // 初始化并启动
      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(drawFrame);
    })();
  </script>
</body>
</html>
