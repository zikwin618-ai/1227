<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seamless Aurora Flow</title>
  <style>
    :root {
      --bg-deep: #020204;
      --bg-mid: #050508;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --accent-pink: #ec4899;
      --glow-intensity: 0.8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-deep);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    /* 深层背景渐变 - 营造深邃感 */
    .deep-bg {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(139, 92, 246, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(6, 182, 212, 0.12), transparent),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(236, 72, 153, 0.08), transparent),
        var(--bg-deep);
      z-index: 0;
    }

    /* 主Canvas层 - 极光流光 */
    #aurora-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* 噪点纹理覆盖 - 增加质感 */
    .grain-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* 前景内容区域（可自定义） */
    .content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 64px;
      text-align: center;
      pointer-events: auto;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(139, 92, 246, 0.1);
    }

    .subtitle {
      font-size: 12px;
      letter-spacing: 0.4em;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .title {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #ffffff;
      margin-bottom: 16px;
      text-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
    }

    .title span {
      font-weight: 600;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4, #ec4899);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 8s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .description {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.2em;
      max-width: 400px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .glass-card {
        padding: 32px 40px;
        margin: 0 20px;
      }
      .title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <!-- 深层背景 -->
  <div class="deep-bg"></div>
  
  <!-- 极光Canvas -->
  <canvas id="aurora-canvas"></canvas>
  
  <!-- 噪点覆盖 -->
  <div class="grain-overlay"></div>
  
  <!-- 前景内容 -->
  <div class="content">
    <div class="glass-card">
      <div class="subtitle">Visual Design Experience</div>
      <h1 class="title">AURORA <span>FLOW</span></h1>
      <p class="description">Seamless infinite loop with ethereal glow and fluid dynamics</p>
    </div>
  </div>

  <script>
    /**
     * 高级无缝循环极光系统
     * 核心技术：双缓冲离屏渲染 + 数学波形叠加 + 动态色彩插值
     */
    class AuroraSystem {
      constructor() {
        this.canvas = document.getElementById('aurora-canvas');
        this.ctx = this.canvas.getContext('2d', { alpha: true });
        
        // 离屏画布用于无缝循环
        this.offCanvas = document.createElement('canvas');
        this.offCtx = this.offCanvas.getContext('2d', { alpha: true });
        
        this.dpr = Math.max(1, window.devicePixelRatio || 1);
        this.width = 0;
        this.height = 0;
        this.offWidth = 0;
        
        this.time = 0;
        this.scrollOffset = 0;
        this.scrollSpeed = 0.8; // 像素/帧，控制流动速度
        
        // 波浪配置（可调整）
        this.ribbons = [
          {
            baseColor: { r: 139, g: 92, b: 246 }, // 紫色
            yOffset: -80,
            amplitude: 100,
            frequency: 0.002,
            speed: 0.0005,
            phase: 0,
            lineWidth: 4,
            blur: 60,
            opacity: 0.9
          },
          {
            baseColor: { r: 6, g: 182, b: 212 }, // 青色
            yOffset: 20,
            amplitude: 80,
            frequency: 0.0025,
            speed: 0.0007,
            phase: Math.PI * 0.5,
            lineWidth: 3,
            blur: 50,
            opacity: 0.85
          },
          {
            baseColor: { r: 236, g: 72, b: 153 }, // 粉色
            yOffset: 120,
            amplitude: 90,
            frequency: 0.0018,
            speed: 0.0006,
            phase: Math.PI,
            lineWidth: 3.5,
            blur: 55,
            opacity: 0.8
          },
          {
            baseColor: { r: 99, g: 102, b: 241 }, // 靛蓝
            yOffset: -20,
            amplitude: 70,
            frequency: 0.003,
            speed: 0.0008,
            phase: Math.PI * 1.5,
            lineWidth: 2.5,
            blur: 40,
            opacity: 0.75
          }
        ];
        
        this.init();
      }
      
      init() {
        this.resize();
        window.addEventListener('resize', () => this.resize(), { passive: true });
        
        // 鼠标视差效果
        this.mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
        window.addEventListener('mousemove', (e) => {
          this.mouse.targetX = (e.clientX / this.width - 0.5) * 2;
          this.mouse.targetY = (e.clientY / this.height - 0.5) * 2;
        }, { passive: true });
        
        this.animate();
      }
      
      resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        
        // 主画布设置
        this.canvas.style.width = `${this.width}px`;
        this.canvas.style.height = `${this.height}px`;
        this.canvas.width = this.width * this.dpr;
        this.canvas.height = this.height * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);
        
        // 离屏画布为2倍宽度实现无缝循环
        this.offWidth = this.width * 2;
        this.offCanvas.width = this.offWidth * this.dpr;
        this.offCanvas.height = this.height * this.dpr;
        this.offCtx.scale(this.dpr, this.dpr);
        
        // 重新计算波浪振幅适配新高度
        this.ribbons.forEach(ribbon => {
          ribbon.amplitude = Math.min(ribbon.amplitude, this.height * 0.15);
        });
      }
      
      /**
       * 获取动态色彩（随时间微妙变化）
       */
      getDynamicColor(base, time, index) {
        const shift = Math.sin(time * 0.0003 + index * 2) * 0.1;
        return {
          r: Math.min(255, Math.max(0, base.r + shift * 50)),
          g: Math.min(255, Math.max(0, base.g + shift * 30)),
          b: Math.min(255, Math.max(0, base.b + shift * 40))
        };
      }
      
      /**
       * 计算波浪Y坐标（多重正弦叠加）
       */
      calculateY(x, ribbon, time, mouseParallax) {
        const baseY = this.height / 2 + ribbon.yOffset + mouseParallax;
        
        // 主波形
        const primary = Math.sin(x * ribbon.frequency + time * ribbon.speed + ribbon.phase);
        // 次波形（更高频细节）
        const secondary = Math.sin(x * ribbon.frequency * 1.5 - time * ribbon.speed * 0.7) * 0.4;
        // 第三层波形（极低频起伏）
        const tertiary = Math.sin(x * ribbon.frequency * 0.3 + time * ribbon.speed * 0.3) * 0.2;
        
        return baseY + (primary + secondary + tertiary) * ribbon.amplitude;
      }
      
      /**
       * 渲染单条波浪到指定上下文
       */
      drawRibbon(ctx, ribbon, time, offsetX, mouseParallax) {
        const dynamicColor = this.getDynamicColor(ribbon.baseColor, time, ribbon.phase);
        const colorStr = `rgba(${dynamicColor.r}, ${dynamicColor.g}, ${dynamicColor.b}, ${ribbon.opacity})`;
        
        ctx.save();
        
        // 外发光层
        ctx.shadowBlur = ribbon.blur;
        ctx.shadowColor = colorStr;
        ctx.strokeStyle = colorStr;
        ctx.lineWidth = ribbon.lineWidth;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        for (let x = 0; x <= this.width + 10; x += 6) {
          const worldX = x + offsetX;
          const y = this.calculateY(worldX, ribbon, time, mouseParallax);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        // 内高光层（增加立体感）
        ctx.shadowBlur = 0;
        ctx.strokeStyle = `rgba(255, 255, 255, ${ribbon.opacity * 0.3})`;
        ctx.lineWidth = ribbon.lineWidth * 0.4;
        
        ctx.beginPath();
        for (let x = 0; x <= this.width + 10; x += 6) {
          const worldX = x + offsetX;
          const y = this.calculateY(worldX, ribbon, time, mouseParallax);
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        ctx.restore();
      }
      
      /**
       * 渲染完整帧到离屏画布
       */
      renderOffscreen() {
        // 清空离屏画布
        this.offCtx.clearRect(0, 0, this.offWidth, this.height);
        
        // 鼠标视差插值（平滑跟随）
        this.mouse.x += (this.mouse.targetX - this.mouse.x) * 0.05;
        this.mouse.y += (this.mouse.targetY - this.mouse.y) * 0.05;
        const mouseParallax = this.mouse.y * 30;
        
        // 绘制第一屏（0 ~ width）
        this.ribbons.forEach((ribbon, i) => {
          this.drawRibbon(this.offCtx, ribbon, this.time, 0, mouseParallax * (i % 2 === 0 ? 1 : -1));
        });
        
        // 绘制第二屏（width ~ 2*width），完全复制实现无缝
        this.offCtx.save();
        this.offCtx.translate(this.width, 0);
        this.ribbons.forEach((ribbon, i) => {
          // 第二屏相位需要微调以确保衔接处平滑
          const ribbonCopy = { ...ribbon, phase: ribbon.phase + this.width * ribbon.frequency };
          this.drawRibbon(this.offCtx, ribbonCopy, this.time, 0, mouseParallax * (i % 2 === 0 ? 1 : -1));
        });
        this.offCtx.restore();
      }
      
      /**
       * 动画循环
       */
      animate() {
        // 更新时间
        this.time += 16; // 约60fps，每帧16ms
        
        // 更新滚动偏移（实现无缝循环）
        this.scrollOffset += this.scrollSpeed;
        if (this.scrollOffset >= this.width) {
          this.scrollOffset -= this.width;
        }
        
        // 渲染到离屏
        this.renderOffscreen();
        
        // 裁剪显示区域到主画布
        this.ctx.clearRect(0, 0, this.width, this.height);
        this.ctx.drawImage(
          this.offCanvas,
          this.scrollOffset * this.dpr, 0,           // 源x, y
          this.width * this.dpr, this.height * this.dpr, // 源width, height
          0, 0,                                      // 目标x, y
          this.width, this.height                     // 目标width, height
        );
        
        requestAnimationFrame(() => this.animate());
      }
    }
    
    // 启动系统
    document.addEventListener('DOMContentLoaded', () => {
      new AuroraSystem();
    });
  </script>
</body>
</html>
